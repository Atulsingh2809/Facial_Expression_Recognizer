# Deploy from repo subfolder: set Root Directory to `facial-expression-recognition/frontend`
services:
  - type: static
    name: fer-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
