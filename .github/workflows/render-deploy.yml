name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        uses: render-examples/render-deploy@v1
        with:
          api_key: ${{ secrets.RENDER_API_KEY }}
          blueprint: render.yaml
